
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BABA Staff - Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #1a1a2e;
            --accent-color: #00d4ff;
            --gradient-accent: linear-gradient(135deg, #00d4ff, #0099cc);
            --text-gray: #6c757d;
            --shadow-medium: 0 10px 30px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .reset-container {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafe 50%, #e8f4fd 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            border: 3px solid rgba(0, 212, 255, 0.4);
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        
        .reset-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--gradient-accent);
            box-shadow: 0 2px 15px rgba(0, 212, 255, 0.5);
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="tint" patternUnits="userSpaceOnUse" width="10" height="10"><rect width="10" height="10" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23tint)"/></svg>');
            opacity: 0.3;
        }
        
        .reset-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: var(--gradient-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: var(--shadow-medium);
            position: relative;
            z-index: 2;
        }
        
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
            z-index: 2;
        }
        
        .form-container {
            padding: 3rem 2rem;
            color: var(--primary-color);
        }
        
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 600;
        }
        
        .alert.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        
        .alert.success {
            background: #d1e7dd;
            border: 2px solid #28a745;
            color: #0f5132;
        }
        
        .alert.info {
            background: #cce8ff;
            border: 2px solid var(--accent-color);
            color: #004085;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
        }
        
        .input-group i {
            position: absolute;
            left: 20px;
            top: calc(50% + 14px);
            transform: translateY(-50%);
            color: var(--accent-color);
            z-index: 2;
            font-size: 1.2rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 18px 25px 18px 55px;
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            font-family: inherit;
            font-size: 1.05rem;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafe 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.15), 0 8px 25px rgba(0, 0, 0, 0.1);
            background: #ffffff;
            transform: translateY(-2px);
        }
        
        .btn-submit {
            width: 100%;
            background: var(--gradient-accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            margin-bottom: 1.5rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-to-login {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 2px solid rgba(0, 212, 255, 0.1);
        }
        
        .back-to-login a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 10px 20px;
            border-radius: 8px;
            transition: var(--transition);
        }
        
        .back-to-login a:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .security-info {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .security-info h4 {
            color: #856404;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .security-info ul {
            color: #856404;
            margin: 0;
            padding-left: 20px;
            line-height: 1.6;
        }
        
        .security-info li {
            margin: 0.5rem 0;
        }
        
        @media (max-width: 768px) {
            .reset-container {
                margin: 10px;
                max-width: 95%;
            }
            
            .header {
                padding: 2rem 1.5rem 1.5rem;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .form-container {
                padding: 2rem 1.5rem;
            }
            
            .reset-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="header">
            <div class="reset-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>🚗 AI BABA AUTO DETAILING AND TINTING</h1>
            <p>Staff Portal - Password Reset</p>
        </div>
        
        <div class="form-container">
            <div id="alertContainer"></div>
            
            <form id="resetForm">
                <div class="input-group">
                    <label for="token">Reset Token</label>
                    <i class="fas fa-shield-alt"></i>
                    <input type="text" id="token" name="token" placeholder="Enter your reset token" required readonly>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Your staff email address" required readonly>
                </div>
                
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter your new password" required minlength="8">
                </div>
                
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required minlength="8">
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-save"></i>
                    Reset Password
                </button>
            </form>
            
            <div class="back-to-login">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
            
            <div class="security-info">
                <h4><i class="fas fa-shield-alt"></i> Security Requirements</h4>
                <ul>
                    <li>Password must be at least 8 characters long</li>
                    <li>Include both uppercase and lowercase letters</li>
                    <li>Include at least one number</li>
                    <li>Use a strong, unique password</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        // Pre-fill form fields
        if (token) {
            document.getElementById('token').value = token;
        }
        if (email) {
            document.getElementById('email').value = decodeURIComponent(email);
        }
        
        // Show alert
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${type}`;
            
            const icon = type === 'error' ? 'fas fa-exclamation-triangle' : 
                        type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle';
            
            alertDiv.innerHTML = `
                <i class="${icon}"></i>
                <span>${message}</span>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
        }
        
        // Validate token and email on page load
        if (!token || !email) {
            showAlert('Invalid or expired reset link. Please request a new password reset.', 'error');
            document.getElementById('submitBtn').disabled = true;
        } else {
            // Verify token is valid
            const resetData = localStorage.getItem(`passwordReset_${token}`);
            if (!resetData) {
                showAlert('This reset link has expired or is invalid. Please request a new one.', 'error');
                document.getElementById('submitBtn').disabled = true;
            } else {
                const data = JSON.parse(resetData);
                if (new Date() > new Date(data.expiresAt)) {
                    showAlert('This reset link has expired. Please request a new one.', 'error');
                    document.getElementById('submitBtn').disabled = true;
                    localStorage.removeItem(`passwordReset_${token}`);
                } else {
                    showAlert('Please enter your new password below.', 'info');
                }
            }
        }
        
        // Handle form submission
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match. Please try again.', 'error');
                return;
            }
            
            // Validate password strength
            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters long.', 'error');
                return;
            }
            
            if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(newPassword)) {
                showAlert('Password must contain uppercase, lowercase, and numeric characters.', 'error');
                return;
            }
            
            // Show loading state
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            submitBtn.disabled = true;
            
            // Simulate password reset
            setTimeout(() => {
                try {
                    // Get reset data
                    const resetData = JSON.parse(localStorage.getItem(`passwordReset_${token}`));
                    
                    // Update staff accounts with new password
                    const staffAccounts = JSON.parse(localStorage.getItem('staffAccounts') || '{}');
                    if (staffAccounts[resetData.staffId]) {
                        staffAccounts[resetData.staffId].password = newPassword;
                        staffAccounts[resetData.staffId].lastPasswordReset = new Date().toISOString();
                        localStorage.setItem('staffAccounts', JSON.stringify(staffAccounts));
                    }
                    
                    // Clean up reset token
                    localStorage.removeItem(`passwordReset_${token}`);
                    
                    showAlert('✅ Password reset successfully! You can now login with your new password.', 'success');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                    
                } catch (error) {
                    console.error('Reset error:', error);
                    showAlert('Failed to reset password. Please try again or contact support.', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1500);
        });
        
        // Real-time password validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && newPassword !== confirmPassword) {
                this.style.borderColor = '#dc3545';
            } else {
                this.style.borderColor = 'rgba(0, 212, 255, 0.2)';
            }
        });
    </script>
</body>
</html>
